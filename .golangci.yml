version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - revive
    - misspell

  exclusions:
    rules:
      - linters:
          - errcheck
        text: 'Error return value of `.*\.Close` is not checked'

      - linters:
          - errcheck
        text: 'Error return value of `fmt\.(Fprint|Fprintf)` is not checked'

      - linters:
          - staticcheck
        text: 'QF1012:'

      - linters:
          - staticcheck
        text: 'QF1003:'

      - linters:
          - staticcheck
        text: 'SA9003:'

    paths:
      - third_party$
      - builtin$
      - examples$

linter-settings:
  errcheck:
    ignore: 'io:Close|fmt:Fprint|fmt:Fprintf|net:Close'